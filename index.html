<!doctype html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1, viewport-fit=cover" name="viewport"/>
<title>Blacksmith Dubai Interactive Menu</title>
<style>
:root {
  --bg: #f7f7f7;
  --bg-deep: #ececec;
  --ink: #272727;
  --muted: #5c594e;
  --paper: rgba(255, 255, 255, .72);
  --paper-strong: rgba(255, 255, 255, .92);
  --red: #c12e2b;
  --red-dark: #c12e2b;
  --line: rgba(28,28,26,.18);
  --shadow: 0 28px 80px rgba(28, 28, 26, .18);
  --soft-shadow: 0 18px 44px rgba(28, 28, 26, .12);
  --radius-xl: 34px;
  --radius-lg: 24px;
  --gotham: "Gotham", "Gotham A", "Gotham SSm", "Montserrat", "Avenir Next", "Helvetica Neue", Arial, sans-serif;
}
* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  background:
    radial-gradient(circle at 20% 10%, rgba(255,255,255,.24), transparent 24rem),
    linear-gradient(130deg, #ffffff 0%, var(--bg) 44%, #ececec 100%);
  color: var(--ink);
  font-family: var(--gotham);
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  opacity: .18;
  background-image: linear-gradient(rgba(255,255,255,.38) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.25) 1px, transparent 1px);
  background-size: 72px 72px;
  mask-image: linear-gradient(to bottom, black 0%, transparent 80%);
}
a { color: inherit; }
button, input { font: inherit; }
.app-shell { width: min(1600px, 100%); margin: 0 auto; }
.topbar {
  position: sticky;
  top: 0;
  z-index: 50;
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  background: rgba(247,247,247,.88);
  border-bottom: 1px solid rgba(28,28,26,.12);
}
.topbar-inner {
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 18px;
  align-items: center;
  padding: 18px clamp(18px, 4vw, 58px);
}
.brand { display: flex; align-items: center; gap: 14px; text-decoration: none; min-width: 245px; }
.mark {
  width: 44px;
  height: 44px;
  border: 1.6px solid var(--red);
  display: grid;
  place-items: center;
  color: var(--red);
  letter-spacing: -0.06em;
  font-weight: 700;
  border-radius: 50%;
  position: relative;
}
.mark::before, .mark::after { content: ""; position: absolute; inset: 10px; border-top: 1px solid var(--red); border-bottom: 1px solid var(--red); transform: rotate(45deg); opacity:.7; }
.mark::after { transform: rotate(-45deg); }
.brand-copy strong { display:block; font-weight: 600; letter-spacing: .16em; font-size: 12px; color: var(--red); }
.brand-copy span { display:block; font-size: 11px; letter-spacing: .24em; text-transform: uppercase; color: var(--muted); margin-top: 4px; }
.nav-pills { display: flex; align-items: center; justify-content: center; gap: 10px; overflow-x: auto; padding: 4px 2px; scrollbar-width: none; }
.nav-pills::-webkit-scrollbar { display: none; }
.nav-pills a {
  text-decoration: none;
  border: 1px solid rgba(28,28,26,.16);
  padding: 10px 16px;
  border-radius: 999px;
  font-size: 12px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--ink);
  background: rgba(255,255,255,.14);
  white-space: nowrap;
  transition: .25s ease;
}
.nav-pills a:hover, .nav-pills a.active {
  background: var(--ink);
  color: #f8f1de;
  transform: translateY(-1px);
}
.search-wrap { display: flex; justify-content: flex-end; }
.search {
  width: min(310px, 24vw);
  min-width: 180px;
  border: 1px solid rgba(28,28,26,.18);
  background: rgba(255,255,255,.18);
  border-radius: 999px;
  padding: 12px 16px;
  color: var(--ink);
  outline: none;
}
.search::placeholder { color: rgba(39,39,39,.55); }
.hero {
  min-height: clamp(650px, 82vh, 980px);
  display: grid;
  grid-template-columns: 1.02fr .98fr;
  gap: clamp(26px, 5vw, 72px);
  align-items: center;
  padding: clamp(36px, 6vw, 88px) clamp(18px, 4vw, 64px) 48px;
  position: relative;
}
.hero::after {
  content: "";
  position: absolute;
  right: clamp(20px, 7vw, 120px);
  top: 18%;
  width: clamp(180px, 28vw, 460px);
  aspect-ratio: 1;
  border: 1px solid rgba(199,53,50,.2);
  border-radius: 50%;
  z-index: -1;
}
.eyebrow {
  color: var(--red);
  text-transform: uppercase;
  font-size: 12px;
  letter-spacing: .48em;
  font-weight: 600;
  margin-bottom: 26px;
}
.hero h1 {
  margin: 0;
  font-size: clamp(54px, 8.2vw, 140px);
  line-height: .88;
  letter-spacing: -.055em;
  font-weight: 400;
  max-width: 820px;
}
.hero h1 b { font-weight: 700; }
.hero p { max-width: 640px; font-size: clamp(16px, 1.35vw, 22px); line-height: 1.55; color: var(--muted); margin: 26px 0 0; }
.hero-actions { display: flex; gap: 14px; margin-top: 34px; flex-wrap: wrap; }
.btn {
  border: 1px solid rgba(28,28,26,.24);
  padding: 14px 20px;
  border-radius: 999px;
  text-decoration: none;
  background: rgba(255,255,255,.16);
  font-size: 12px;
  letter-spacing: .18em;
  text-transform: uppercase;
  transition: .25s ease;
  cursor: pointer;
}
.btn.primary { background: var(--red); border-color: var(--red); color: #fff4e8; }
.btn:hover { transform: translateY(-2px); box-shadow: 0 14px 36px rgba(28,28,26,.12); }
.hero-card {
  position: relative;
  border-radius: var(--radius-xl);
  overflow: hidden;
  min-height: 560px;
  background: rgba(255,255,255,.18);
  box-shadow: var(--shadow);
  border: 1px solid rgba(255,255,255,.32);
}
.hero-card img { width: 100%; height: 100%; object-fit: cover; position:absolute; inset:0; }
.hero-card .glass-label {
  position:absolute;
  left: 24px;
  right: 24px;
  bottom: 24px;
  padding: 18px 20px;
  border-radius: 20px;
  background: rgba(24,24,22,.62);
  color: #f8f1de;
  backdrop-filter: blur(12px);
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: end;
}
.glass-label span { color: rgba(248,241,222,.7); text-transform: uppercase; font-size: 11px; letter-spacing: .24em; }
.glass-label strong { display:block; margin-top: 6px; font-size: 24px; letter-spacing: -.02em; }
.section { padding: 74px clamp(18px, 4vw, 64px); }
.section-head {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 20px;
  align-items: end;
  margin-bottom: 28px;
}
.section-kicker { color: var(--ink); letter-spacing: .42em; font-size: 12px; text-transform: uppercase; font-weight: 700; margin-bottom: 13px; }
.section h2 { margin: 0; font-size: clamp(42px, 5.3vw, 92px); line-height: .94; letter-spacing: -.052em; font-weight: 400; }
#signature h2, #food h2, #drinks h2, #desserts h2 { color: var(--red); }
.section h2 b { font-weight: 700; }
.exclusive-red-word { color: var(--red) !important; }
.lots-thin-word {
  font-weight: 200 !important;
  letter-spacing: -.055em !important;
}
.section-desc { max-width: 600px; color: var(--muted); font-size: 16px; line-height: 1.55; margin: 0; }
.category-hero {
  min-height: 360px;
  border-radius: var(--radius-xl);
  overflow:hidden;
  position: relative;
  margin: 34px 0 34px;
  box-shadow: var(--soft-shadow);
}
.category-hero img { width:100%; height:100%; object-fit:cover; display:block; }
.category-hero::after { content:""; position:absolute; inset:0; background: linear-gradient(90deg, rgba(28,28,26,.12), transparent 50%); }
.grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 22px; }
.card {
  background: var(--paper);
  border: 1px solid rgba(255,255,255,.32);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: 0 18px 48px rgba(28,28,26,.09);
  display: flex;
  flex-direction: column;
  min-height: 100%;
  transition: .28s ease;
  position: relative;
}
.card:hover { transform: translateY(-6px); box-shadow: 0 28px 70px rgba(28,28,26,.15); }
.image-box {
  height: 310px;
  position: relative;
  background: linear-gradient(145deg, rgba(255,255,255,.26), rgba(255,255,255,.04));
  overflow: hidden;
  padding: 22px;
  display: flex;
}
.image-inner {
  width: 100%;
  height: 100%;
  overflow: hidden;
  position: relative;
}
.image-box img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
  transform: scale(1);
  transform-origin: center center;
  transition: transform .32s ease;
}
.card:hover .image-box img { transform: scale(1.04); }
.badge {
  position:absolute;
  top: 16px;
  left: 16px;
  z-index: 2;
  border: 1.6px solid var(--red);
  color: var(--red);
  background: rgba(247,247,247,.82);
  backdrop-filter: blur(8px);
  padding: 8px 10px;
  border-radius: 0;
  text-transform: uppercase;
  letter-spacing: .12em;
  font-size: 11px;
  font-weight: 700;
}
.card-body { padding: 22px 22px 24px; flex: 1; display: flex; flex-direction: column; }
.card-top { display:flex; justify-content:space-between; gap: 16px; align-items:start; margin-bottom: 12px; }
.card h3 { margin:0; font-size: 30px; line-height: 1.02; letter-spacing: -.045em; font-weight: 400; }
.card h3 b { font-weight: 700; }
.price {
  color: var(--red);
  font-size: 16px;
  font-weight: 700;
  white-space: nowrap;
  margin-top: 4px;
}
.card p { margin: 0; color: var(--muted); line-height: 1.45; font-size: 14.5px; }

.note strong,
#modalNote strong {
  font-weight: 700 !important;
}

.note {
  margin-top: 14px;
  padding-top: 12px;
  border-top: 1px solid var(--line);
  color: var(--ink) !important;
  font-size: 13px !important;
}
.tags { display:flex; flex-wrap:wrap; gap:8px; margin-top: 18px; }
.tag { font-size: 11px; letter-spacing:.12em; text-transform:uppercase; border:1px solid rgba(28,28,26,.18); padding:7px 9px; border-radius:999px; color: var(--muted); }
.card-actions { margin-top: auto; padding-top: 20px; display:flex; gap: 10px; }
.mini-btn {
  border: 1px solid rgba(28,28,26,.18);
  background: rgba(255,255,255,.14);
  border-radius: 999px;
  padding: 10px 14px;
  font-size: 11px;
  letter-spacing:.14em;
  text-transform:uppercase;
  cursor: pointer;
}
.mini-btn.dark { background: var(--ink); color:#f8f1de; border-color:var(--ink); }
.lots-wrap {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 22px;
  margin-top: 26px;
}
.lot-panel {
  background: var(--paper-strong);
  border: 1px solid rgba(255,255,255,.35);
  border-radius: var(--radius-xl);
  padding: 26px;
  box-shadow: var(--soft-shadow);
}
.lot-panel h3 { color: var(--red); margin: 0 0 22px; font-size: 26px; letter-spacing:.08em; text-transform:uppercase; }
.lot-item {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 16px;
  padding: 18px 0;
  border-top: 1px solid var(--line);
}
.lot-item:first-of-type { border-top: none; padding-top: 0; }
.origin { color: var(--red); letter-spacing:.12em; font-size: 11px; font-weight:700; }
.lot-name { margin:4px 0 6px; font-size: 18px; font-weight: 650; line-height:1.2; }
.lot-notes { color: var(--muted); line-height:1.4; font-size: 13.5px; }
.process { margin-top: 8px; color: var(--ink); font-size: 12px; letter-spacing:.08em; text-transform:uppercase; }
.lot-price { color: var(--red); font-weight:700; white-space:nowrap; }
.footer { padding: 50px clamp(18px, 4vw, 64px) 80px; text-align:center; color: var(--muted); }
.footer strong { display:block; color: var(--red); letter-spacing:.28em; font-size: 12px; text-transform:uppercase; margin-bottom:10px; }
.modal {
  position: fixed;
  inset: 0;
  z-index: 100;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: rgba(18,18,16,.64);
  backdrop-filter: blur(12px);
}
.modal.open { display: flex; }
.modal-card {
  width: min(1180px, 100%);
  max-height: min(860px, 92vh);
  overflow: hidden;
  border-radius: 34px;
  background: var(--bg);
  box-shadow: 0 36px 110px rgba(0,0,0,.34);
  border: 1px solid rgba(255,255,255,.24);
  display: grid;
  grid-template-columns: 1fr .9fr;
}
.modal-image { background: rgba(255,255,255,.12); min-height: 560px; position:relative; }
.modal-image img { width:100%; height:100%; object-fit:contain; position:absolute; inset:0; }
.modal-copy { padding: clamp(28px, 5vw, 58px); overflow:auto; background:#ffffff !important; }
.close { position:absolute; right: 26px; top: 22px; z-index: 3; border:1px solid #272727 !important; background:transparent !important; color:#272727 !important; border-radius:999px; width:44px; height:44px; cursor:pointer; font-size:22px; font-weight:400; }
.modal-copy .category { color:var(--red); letter-spacing:.3em; text-transform:uppercase; font-size:12px; font-weight:700; }
.modal-copy h3 { font-size: clamp(42px, 6vw, 78px); line-height:.9; letter-spacing:-.06em; margin: 18px 0 20px; font-weight:300; }
.modal-copy h3 b { font-weight: 700; }
.modal-copy p { color:var(--muted); font-size:18px; line-height:1.55; }
.modal-copy .price { font-size: 26px; margin-top: 28px; }
.slide-link { margin-top: 24px; display:inline-flex; }
#emptyState { display:none; padding: 28px; border: 1px solid var(--line); border-radius: var(--radius-lg); color: var(--muted); background:rgba(255,255,255,.15); }
@media (max-width: 1100px) {
  .topbar-inner { grid-template-columns: 1fr; }
  .brand { min-width: 0; }
  .search { width: 100%; }
  .search-wrap { justify-content: stretch; }
  .hero { grid-template-columns: 1fr; }
  .hero-card { min-height: 470px; }
  .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .lots-wrap { grid-template-columns: 1fr; }
  .modal-card { grid-template-columns:1fr; overflow:auto; }
  .modal-image { min-height: 430px; }
}
@media (max-width: 700px) {
  .hero { padding-top: 34px; }
  .hero-card { min-height: 340px; }
  .section-head { grid-template-columns: 1fr; }
  .grid { grid-template-columns: 1fr; }
  .category-hero { min-height: 240px; }
  .image-box { height: 260px; }
  .card h3 { font-size: 26px; }
  .lot-item { grid-template-columns: 1fr; gap:8px; }
  .modal { padding: 10px; }
  .modal-card { border-radius: 24px; }
  .modal-copy { padding: 28px; }
  .modal-image { min-height: 330px; }
}

/* Typography adjustment:
   Headings keep the original premium style.
   Body / description text uses a cleaner Gotham Book / Regular feel. */
p,
.section-desc,
.card-body p,
.modal-copy p,
.lot-notes,
.process,
.note,
.tag,
.price,
.lot-price,
.origin,
.section-kicker,
.search input,
.footer span,
.mini-btn,
.btn {
  font-family: var(--gotham);
  font-weight: 400;
  letter-spacing: 0.005em;
}

.card-body p,
.modal-copy p,
.section-desc,
.lot-notes,
.process,
.note {
  line-height: 1.65;
}

h1, h2, h3,
.hero-title,
.card-body h3,
.modal-copy h3,
.section-head h2,
.lot-panel h3 {
  letter-spacing: inherit;
}

.slide-link { display: none !important; }

/* Remove rounded corners from interface boxes */
.nav-pills a,
.search,
.btn,
.hero-card,
.hero-card .glass-label,
.category-hero,
.card,
.image-box,
.tag,
.lot-panel,
#emptyState,
.modal-card,
.close,
.footer,
.topbar {
  border-radius: 0 !important;
}

}

  box-shadow: none !important;

/* Replace text logo/company name with attached logo image */
.brand {

const products = DATA.products;
const lots = DATA.lots;
const images = DATA.images;
const qs = (s, el=document) => el.querySelector(s);
const qsa = (s, el=document) => Array.from(el.querySelectorAll(s));
const splitTitle = name => {
  const words = name.split(' ');
  if (words.length < 2) return `<b>${name}</b>`;
  const boldStart = Math.max(1, words.length - 2);

function plainText(str) {
  return String(str || "").replace(/<[^>]*>/g, " ").replace(/\s+/g, " ").trim();
}
function formatNote(note) {
  if (!note) return '';
  return note.replace('Choose your bagel:', '<strong>Choose your bagel:</strong>');
}
function productCard(p) {
  const priceHtml = (p.price === null || p.price === undefined || p.price === '') ? '' : `<div class="price">${money(p.price)}</div>`;
  return `<article class="card menu-card" data-name="${p.name.toLowerCase()}" data-desc="${plainText(p.desc).toLowerCase()}" data-category="${p.category}" data-id="${p.id}">
    <div class="image-box">
      ${p.recommended ? '<span class="badge">Recommended</span>' : ''}
      <div class="image-inner">
        <img src="${images[p.id]}" alt="${p.name}">
      </div>
    </div>
    <div class="card-body">
      <div class="card-top"><h3>${splitTitle(p.name)}</h3>${priceHtml}</div>
      <p>${p.desc}</p>
      ${p.note ? `<p class="note">${formatNote(p.note)}</p>` : ''}
      <div class="tags">${(p.tags || []).map(t => `<span class="tag">${t}</span>`).join('')}</div>
      <div class="card-actions"><button class="mini-btn dark" data-open="${p.id}">Detail</button></div>
    </div>
  </article>`;
}
function renderProducts() {
  qs('#signatureGrid').innerHTML = products.filter(p => p.category === 'Signature Drinks').map(productCard).join('');
  qs('#drinksGrid').innerHTML = products.filter(p => p.category === 'Drinks').map(productCard).join('');
  qs('#dessertsGrid').innerHTML = products.filter(p => p.category === 'Desserts').map(productCard).join('');
}
function renderLots() {
  const groups = ['Filter', 'Espresso'];
  const displayName = group => group === 'Espresso' ? 'Espresso-Base' : group;
  qs('#lotsWrap').innerHTML = groups.map(group => `<div class="lot-panel" data-lot-group="${group}"><h3>${displayName(group)}</h3>${lots.filter(l => l.group === group).map(l => `<div class="lot-item" data-name="${(l.origin + ' ' + l.name + ' ' + l.notes + ' ' + l.process).toLowerCase()}"><div><div class="lot-name">${l.origin}</div><div class="origin">${l.name}</div><div class="lot-notes">${l.notes}</div>${l.process ? `<div class="process">${l.process}</div>` : ''}</div>${(l.price === null || l.price === undefined || l.price === '') ? '' : `<div class="lot-price"><span class="for-cup">For a Cup</span> <span class="cup-price">${money(l.price)}</span></div>`}</div>`).join('')}</div>`).join('');
}
renderProducts();
renderLots();

function openModal(id, showSlide=false) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  const imgKey = showSlide ? `slide-${String(p.page).padStart(2, '0')}` : p.id;
  qs('#modalImg').src = images[imgKey] || images[p.id];
  qs('#modalImg').alt = p.name;
  qs('#modalCategory').textContent = p.category;
  qs('#modalTitle').innerHTML = splitTitle(p.name);
  qs('#modalDesc').innerHTML = p.desc;
  qs('#modalPrice').innerHTML = money(p.price);
  qs('#modalPrice').style.display = money(p.price) ? '' : 'none';
  qs('#modalTags').innerHTML = (p.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
  qs('#modalNote').style.display = p.note ? 'block' : 'none';
  qs('#modalNote').innerHTML = formatNote(p.note || '');
  qs('#productModal').classList.remove('food-item','signature-item','dessert-item');
  qs('#productModal').classList.add(p.category === 'All Day Food' ? 'food-item' : (p.category === 'Desserts' ? 'dessert-item' : 'signature-item'));
  qs('#productModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal() { qs('#productModal').classList.remove('open'); document.body.style.overflow = ''; }
document.addEventListener('click', e => {
  const open = e.target.closest('[data-open]');
  const slide = e.target.closest('[data-slide]');
  if (open) openModal(open.dataset.open, false);
  if (slide) openModal(slide.dataset.slide, true);
  if (e.target.matches('.close') || e.target.id === 'productModal') closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

const searchInput = qs('#searchInput');
searchInput.addEventListener('input', () => {
  const term = searchInput.value.trim().toLowerCase();
  let visibleCards = 0;
  qsa('.menu-card').forEach(card => {
    const hit = !term || card.dataset.name.includes(term) || card.dataset.desc.includes(term) || card.dataset.category.toLowerCase().includes(term);
    card.style.display = hit ? '' : 'none';
    if (hit) visibleCards++;
  });
  let visibleLots = 0;
  qsa('.lot-item').forEach(item => {
    const hit = !term || item.dataset.name.includes(term) || 'exclusive lots filter espresso'.includes(term);
    item.style.display = hit ? '' : 'none';
    if (hit) visibleLots++;
  });
  qsa('.lot-panel').forEach(panel => {
    const hasVisible = qsa('.lot-item', panel).some(item => item.style.display !== 'none');
    panel.style.display = hasVisible ? '' : 'none';
  });
  qs('#emptyState').style.display = (visibleCards + visibleLots) ? 'none' : 'block';
});

const sections = ['signature','drinks','desserts','exclusive'].map(id => qs('#'+id)).filter(Boolean);
const navLinks = qsa('.nav-pills a');
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      navLinks.forEach(a => a.classList.toggle('active', a.getAttribute('href') === '#' + entry.target.id));
    }
  });
}, { rootMargin: '-40% 0px -55% 0px', threshold: 0 });
sections.forEach(s => observer.observe(s));
</script>
</body>
</html>
